<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Rainbow gradient background matching the app icon -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4A742"/>
      <stop offset="20%" stop-color="#E8733A"/>
      <stop offset="40%" stop-color="#E24062"/>
      <stop offset="60%" stop-color="#D43B8C"/>
      <stop offset="80%" stop-color="#B03AAF"/>
      <stop offset="100%" stop-color="#8B3FC1"/>
    </linearGradient>
    <!-- Olive/brown circle gradient -->
    <linearGradient id="circle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7B3A"/>
      <stop offset="50%" stop-color="#6B6B2A"/>
      <stop offset="100%" stop-color="#5A7A3A"/>
    </linearGradient>
    <!-- Green speech bubble gradient -->
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7CB342"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <!-- Lips gradient -->
    <linearGradient id="lips-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="50%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#8B1A1A"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background with rainbow gradient -->
  <rect width="512" height="512" rx="100" fill="url(#bg-grad)"/>

  <!-- Outer olive/dark circle ring -->
  <circle cx="256" cy="240" r="155" fill="url(#circle-grad)" opacity="0.7"/>

  <!-- White speech bubble (main circle) -->
  <circle cx="256" cy="235" r="130" fill="#FFF8E8"/>

  <!-- Green speech bubble tail (bottom-right) -->
  <path d="M330 340 Q360 370 380 400 Q340 380 310 360 Z" fill="url(#green-grad)"/>

  <!-- Small green accent arc on right side -->
  <path d="M370 280 Q400 320 380 370" fill="none" stroke="url(#green-grad)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>

  <!-- Lips shape - upper lip -->
  <path d="M185 245
           Q195 195 235 215
           Q250 195 256 190
           Q262 195 277 215
           Q317 195 327 245
           Q310 260 256 285
           Q202 260 185 245 Z"
        fill="url(#lips-grad)"/>

  <!-- Lip line/crease -->
  <path d="M200 245 Q228 235 245 248 Q252 252 256 250 Q260 252 267 248 Q284 235 312 245"
        fill="none" stroke="#8B0000" stroke-width="2.5" opacity="0.5"/>

  <!-- Upper lip highlight -->
  <path d="M220 225 Q238 212 250 218 Q256 210 262 218 Q274 212 292 225"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>

  <!-- Heart -->
  <path d="M233 185
           Q233 172 243 172
           Q253 172 253 185
           Q253 172 263 172
           Q273 172 273 185
           Q273 200 253 210
           Q233 200 233 185 Z"
        fill="#E91E63"/>
</svg>